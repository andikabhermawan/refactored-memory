<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Gift</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet"> -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            overflow-x: hidden;
            width: 100%;
            max-width: 100vw;
        }

        /* body {
            background: linear-gradient(135deg, #fff0f5 0%, #ffe3ed 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #2b2b2b;
        } */

        body {
            /* Hapus background: linear-gradient(...) di sini */
            background-color: #fff0f5; /* Warna dasar pastel */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-y: auto; 
            overflow-x: hidden;
            padding: 40px 0; 
            color: #2b2b2b;
            position: relative; /* Ditambahkan agar liquid tetap di belakang */
            z-index: 1;
        }

        /* --- KODE BARU: EFEK LIQUID BACKGROUND --- */
        .liquid-bg {
            position: fixed;
            top: 0;
            left: 0;
            /* width: 100vw; */
            width: 100%;
            height: 100vh;
            z-index: -1; /* Memastikan cairan selalu ada di lapis paling bawah */
            overflow: hidden;
            pointer-events: none; /* Agar tidak mengganggu klik tombol PIN */
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            /* KUNCI EFEK CAIRAN: Blur yang sangat tinggi agar warna menyatu */
            filter: blur(40px); 
            opacity: 0.8;
            animation: moveLiquid 5s infinite alternate ease-in-out;
        }

        /* Gumpalan Pink Terang */
        .blob-1 {
            width: 400px;
            height: 400px;
            background-color: #ffb6c1; 
            top: -10%;
            left: -10%;
            animation-delay: 0s;
        }

        /* Gumpalan Pink Kemerahan (Aksen) */
        .blob-2 {
            width: 350px;
            height: 350px;
            background-color: #ffcdd2; 
            bottom: -20%;
            right: -10%;
            animation-delay: -5s; /* Mulai dari titik animasi yang berbeda */
        }

        /* Gumpalan Merah Muda Pucat di Tengah */
        .blob-3 {
            width: 500px;
            height: 500px;
            background-color: #ffe3ed; 
            top: 30%;
            left: 20%;
            animation-delay: -10s;
        }

        /* Koreografi Gerakan Organik */
        @keyframes moveLiquid {
            0% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(50px, -50px) scale(1.1);
            }
            66% {
                transform: translate(-30px, 40px) scale(0.9);
            }
            100% {
                transform: translate(20px, 60px) scale(1.2);
            }
        }

        /* Tampilan Layar Utama */
        .screen {
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
            text-align: center;
            transition: all 0.5s ease;
            margin: 0 auto;
        }

        .hidden {
            display: none !important;
            opacity: 0;
            transform: scale(0.9);
        }

        h2 {
            font-family: 'Inter', serif;
            font-size: 2rem;
            margin-bottom: 10px;
            color: #d63384;
        }

        p.clue {
            font-size: 0.9rem;
            color: #6c757d;
            margin-bottom: 40px;
        }

        /* Area Titik PIN */
        .pin-display {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
            height: 20px;
        }

        .dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid #d63384;
            background-color: transparent;
            transition: all 0.2s ease;
        }

        .dot.filled {
            background-color: #d63384;
            transform: scale(1.2);
        }

        /* Animasi bergetar kalau PIN salah */
        .shake {
            animation: shakeError 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shakeError {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
            40%, 60% { transform: translate3d(8px, 0, 0); }
        }

        /* Desain Tombol Angka */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 280px;
            margin: 0 auto;
        }

        .key-btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: none;
            background-color: rgba(255, 255, 255, 0.6);
            font-size: 1.8rem;
            color: #2b2b2b;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(214, 51, 132, 0.05);
            transition: all 0.1s ease;
        }

        .key-btn:active {
            background-color: #d63384;
            color: white;
            transform: scale(0.9);
        }

        .key-action {
            font-size: 1.2rem;
            background-color: transparent;
            box-shadow: none;
            font-weight: 600;
        }

        .success-container {
            padding: 0px 20px;
        }

        /* Tampilan Layar Sukses */
        #successScreen {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(214, 51, 132, 0.15);
            border: 1px solid #ffe3ed;
        }

        #successScreen h1 {
            /* font-family: 'Playfair Display', serif; */
            font-family: 'Inter', serif;
            color: #006643;
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 15px;
        }

        #successScreen p {
            line-height: 1.6;
            margin-bottom: 20px;
            font-size: 1.05rem;
        }

        .gift-icon {
            /* font-size: 4rem; */
            width: 150px;
            /* margin: 20px 0; */
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Desain tombol kembali ke halaman utama */
        .btn-return-home {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 25px;
            /* background: linear-gradient(135deg, #bf953f 0%, #d63384 100%); */
            background: linear-gradient(135deg, #ff6b8b 0%, #d63384 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 8px 20px rgba(214, 51, 132, 0.2);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-return-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(214, 51, 132, 0.3);
        }

        /* Desain dasar layar peringatan (Secara default disembunyikan) */
        .landscape-warning {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #fff0f5 0%, #ffe3ed 100%);
            z-index: 9999; /* Pastikan selalu berada di paling atas menutupi segalanya */
            justify-content: center;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .warning-content {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(214, 51, 132, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* .warning-icon { */
            /* font-size: 3rem; */
            /* width: 150px;
            display: block;
            margin-bottom: 15px; */
            /* animation: rotatePhone 2s infinite ease-in-out; */
        /* } */

        .warning-content h2 {
            font-family: 'Inter', serif;
            color: #d63384;
            margin-bottom: 10px;
        }

        .warning-content p {
            color: #2b2b2b;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .warning-visual {
            background: linear-gradient(135deg, #ffeef4 0%, #fff0f5 100%);
            width: 140px;
            height: 140px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 15px rgba(214, 51, 132, 0.05);
            overflow: hidden; 
            flex-shrink: 0; 
        }

        .warning-icon {
            width: 100%;  
            height: 100%;
            object-fit: contain; 
            animation: gentleWiggle 3s infinite ease-in-out; 
        }

        @keyframes gentleWiggle {
            0%, 100% { transform: rotate(-15deg) scale(1); }
            50% { transform: rotate(15deg) scale(1.03); }
        }

        /* SENSOR ROTASI: Jika layar HP lebih lebar daripada tingginya (Landscape) */
        /* max-height: 600px memastikan ini hanya terpicu di HP, bukan di monitor PC Anda */
        @media screen and (orientation: landscape) and (max-height: 600px) {
            body:not(.unlocked) .landscape-warning {
                display: flex; /* Munculkan layar peringatan */
            }
            body:not(.unlocked) .screen {
                display: none !important; /* Sembunyikan layar PIN dan Layar Sukses */
            }
        }

    </style>
</head>
<body>
    <div class="liquid-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div id="landscapeWarning" class="landscape-warning">
        <div class="warning-content">
            <div class="warning-visual">
                <img src="images/rotate-icon.png" alt="rotate phone icon" class="warning-icon">
            </div>
            
            <h2>Oops!</h2>
            <p>Tolong putar balik HP kamu ke posisi berdiri (Portrait) untuk membuka gembok</p>
        </div>
    </div>

    <div id="lockScreen" class="screen">
        <h2>Unlock Your Gift</h2>
        <p class="clue">Hint: Hari spesial-mu (4 digit)</p>
        
        <div class="pin-display" id="pinDisplay">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <div class="keypad">
            <button class="key-btn" onclick="pressKey('1')">1</button>
            <button class="key-btn" onclick="pressKey('2')">2</button>
            <button class="key-btn" onclick="pressKey('3')">3</button>
            <button class="key-btn" onclick="pressKey('4')">4</button>
            <button class="key-btn" onclick="pressKey('5')">5</button>
            <button class="key-btn" onclick="pressKey('6')">6</button>
            <button class="key-btn" onclick="pressKey('7')">7</button>
            <button class="key-btn" onclick="pressKey('8')">8</button>
            <button class="key-btn" onclick="pressKey('9')">9</button>
            <button class="key-btn key-action" onclick="clearPin()">C</button>
            <button class="key-btn" onclick="pressKey('0')">0</button>
            <button class="key-btn key-action" onclick="deletePin()">⌫</button>
        </div>
    </div>

    <div class="success-container">
        <div id="successScreen" class="screen hidden">
            <!-- <div class="gift-icon">🎁</div> -->
            <div>
                <img src="images/gift-icon.png" alt="gift box" class="gift-icon">
            </div>
            <h1>Access Granted!</h1>
            <!-- <p>Surprisee!</p> -->
            <p>Coba cek jok belakang mobil sekarang! 😉✨</p>

            <a href="index.html" class="btn-return-home">
                Get back to your 26th
            </a>
        </div>
    </div>

    <script>
        // PIN RAHASIA
        const CORRECT_PIN = "2505";
        let currentPin = "";

        const dots = document.querySelectorAll('.dot');
        const pinDisplay = document.getElementById('pinDisplay');

        function updateDots() {
            dots.forEach((dot, index) => {
                if (index < currentPin.length) {
                    dot.classList.add('filled');
                } else {
                    dot.classList.remove('filled');
                }
            });
        }

        function pressKey(num) {
            if (currentPin.length < 4) {
                currentPin += num;
                updateDots();

                // Cek jika sudah 4 digit
                if (currentPin.length === 4) {
                    setTimeout(verifyPin, 300); // Beri jeda sedikit agar titik terakhir terlihat terisi
                }
            }
        }

        function deletePin() {
            if (currentPin.length > 0) {
                currentPin = currentPin.slice(0, -1);
                updateDots();
            }
        }

        function clearPin() {
            currentPin = "";
            updateDots();
        }

        function verifyPin() {
            if (currentPin === CORRECT_PIN) {
                // Berikan penanda ke body bahwa gembok sudah terbuka!
                document.body.classList.add('unlocked');

                // JIKA BENAR: Sembunyikan Keypad, Munculkan Layar Sukses, dan Ledakkan Confetti!
                document.getElementById('lockScreen').style.display = 'none';
                
                const success = document.getElementById('successScreen');
                success.classList.remove('hidden');
                
                // Letupan confetti yang meriah
                var duration = 3 * 1000;
                var end = Date.now() + duration;

                (function frame() {
                    confetti({
                        particleCount: 5,
                        angle: 60,
                        spread: 55,
                        origin: { x: 0 },
                        colors: ['#d63384', '#ffe3ed', '#bf953f']
                    });
                    confetti({
                        particleCount: 5,
                        angle: 120,
                        spread: 55,
                        origin: { x: 1 },
                        colors: ['#d63384', '#ffe3ed', '#bf953f']
                    });

                    if (Date.now() < end) {
                        requestAnimationFrame(frame);
                    }
                }());

            } else {
                // JIKA SALAH: Getarkan titik merah, lalu bersihkan PIN
                pinDisplay.classList.add('shake');
                
                // Hapus efek getar setelah animasi selesai (400ms)
                setTimeout(() => {
                    pinDisplay.classList.remove('shake');
                    clearPin();
                }, 400);
            }
        }
    </script>
</body>
</html>
